name: new_care
description: "New Care - نيو كير | نظام إدارة مركز التمريض"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_remote_config: ^5.3.3

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Local Database
  sqflite_common_ffi: ^2.3.4+4
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # UI & Design
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Printing & PDF
  pdf: ^3.11.3
  printing: ^5.14.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  shared_preferences: ^2.5.3

  # Icons
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  windows:
    generate: true
    icon_path: "assets/images/logo.png"
  image_path: "assets/images/logo.png"
